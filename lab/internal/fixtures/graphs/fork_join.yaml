    kind: compute
    unit: lab.echo
    transitions:
      - target: branch_a
  branch_a:
    kind: compute
    unit: lab.echo
    transitions:
      - target: branch_b
  branch_b:
    kind: compute
    unit: lab.echo
    transitions:
      - target: join
  join:
    kind: compute
    unit: lab.echo
    transitions:
      - target: done
  done:
    kind: terminal
    outcome: success
