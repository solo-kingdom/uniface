graph_id: approval
version: v1
entity_type: lab.Generic
schema_version: v1
entry: wait
nodes:
  # 等待外部 approval 信号。演示 WAIT + signal 路由能力。
  # StartInstance + 首次 DrainInstance 后实例立即停在 WAITING，
  # 由 POST /signal/{entityID} 推进到终态。
  wait:
    kind: wait
    signal: approval
    deadline_seconds: 3600
    on_timeout: failure
    transitions:
      - target: success
        priority: 10
        condition:
          signal:
            name: approval
      - target: failure
        condition:
          always: true
  success:
    kind: terminal
    outcome: success
  failure:
    kind: terminal
    outcome: failure
