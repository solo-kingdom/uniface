kv:
  impl: redis
  addr: localhost:6379
  path: /tmp/uniface-lab/kv.bolt

config:
  impl: consul
  addr: localhost:8500
  prefix: lab/

lb:
  algo: roundrobin

queue:
  impl: nats
  addr: nats://localhost:4222
  brokers:
    - localhost:9092
  username: guest
  password: guest

# lab-dag 与 lab-dag-http 各自拥有独立的 fixture 目录：
#   - lab-dag 使用 lab/internal/fixtures/graphs（多种通用图）；
#   - lab-dag-http 使用 lab/app/daghttp/fixtures/graphs（自包含 echo 图）。
# 双方均通过 LAB_DAG_FIXTURES_DIR 覆盖；yaml 不再共享 fixtures_dir 字段。
dag:
  store: memory

# lab-dag-signal 演示 WAIT + signal 异步编排：
#   - 使用 lab/app/dagsignal/fixtures/graphs（自包含 approval 图）；
#   - 通过 LAB_DAGSIGNAL_FIXTURES_DIR 覆盖；dagsignal 自治其配置段。
dagsignal:
  store: memory
  fixtures_dir: app/dagsignal/fixtures/graphs

services:
  kv: http://localhost:8081
  config: http://localhost:8082
  lb: http://localhost:8083
  queue: http://localhost:8084
  dag: http://localhost:8085
